<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f2ea" />
  <link rel="manifest" href="../manifest.json" />
  <title>Bowcast · rainbow forecast</title>
  <meta name="description" content="The chance of seeing a rainbow around you, hour by hour. Real ensemble forecasts, anywhere on Earth." />
  <meta property="og:title" content="Bowcast · rainbow forecast" />
  <meta property="og:description" content="The chance of seeing a rainbow around you, hour by hour. Real ensemble forecasts, anywhere on Earth." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://bowcast.app/icons/icon-512.webp" />
  <link rel="icon" href="../icon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Instrument+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <link rel="stylesheet" href="../styles.css" />
</head>
<body>

  <header id="app-header">
    <div id="header-left">
      <h1 id="app-title">
        <a class="brand-home" href="../" aria-label="Bowcast home">
          <svg class="brand-glyph" viewBox="0 0 26 20" aria-hidden="true">
            <path d="M3 16 A10 10 0 0 1 23 16" fill="none" stroke="#7a68d9" stroke-width="2.4" stroke-linecap="butt"/>
            <path d="M6.5 16 A6.5 6.5 0 0 1 19.5 16" fill="none" stroke="#2f9e8f" stroke-width="2.4" stroke-linecap="butt"/>
            <path d="M10 16 A3 3 0 0 1 16 16" fill="none" stroke="#dd9f2e" stroke-width="2.4" stroke-linecap="butt"/>
            <line x1="1" y1="16" x2="25" y2="16" stroke="#232a35" stroke-width="1.6" stroke-linecap="round"/>
          </svg><span class="brand-name">Bowcast</span><span class="brand-tag">rainbow forecast</span>
        </a>
      </h1>
    </div>
    <div id="header-right">
      <nav class="view-switch" data-active="map" aria-label="Switch section">
        <a class="seg" aria-current="page" href="./">Map</a>
        <a class="seg" href="../now/">Now</a>
      </nav>
      <span id="updated-text" aria-live="polite">Loading…</span>
      <button id="search-btn" title="Search a place" aria-label="Search a place">
        <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><circle cx="7" cy="7" r="4.6" fill="none" stroke="currentColor" stroke-width="1.4"/><line x1="10.6" y1="10.6" x2="14.4" y2="14.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
      <button id="locate-btn" title="Use my location" aria-label="Use my location">
        <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><circle cx="8" cy="8" r="2.4" fill="currentColor"/><circle cx="8" cy="8" r="5.6" fill="none" stroke="currentColor" stroke-width="1.4"/><line x1="8" y1="0.6" x2="8" y2="3" stroke="currentColor" stroke-width="1.4"/><line x1="8" y1="13" x2="8" y2="15.4" stroke="currentColor" stroke-width="1.4"/><line x1="0.6" y1="8" x2="3" y2="8" stroke="currentColor" stroke-width="1.4"/><line x1="13" y1="8" x2="15.4" y2="8" stroke="currentColor" stroke-width="1.4"/></svg>
      </button>
      <button id="notify-btn" aria-label="Enable rainbow alerts">
        <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><path d="M8 1.5 a4.2 4.2 0 0 0 -4.2 4.2 c0 3.2 -1.4 4.6 -1.4 4.6 h11.2 s-1.4 -1.4 -1.4 -4.6 A4.2 4.2 0 0 0 8 1.5 z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M6.5 13 a1.6 1.6 0 0 0 3 0" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
      <button id="refresh-btn" title="Refresh data" aria-label="Refresh data">
        <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><path d="M13.6 6.4 A6 6 0 1 0 14 8.6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="13.8,2.6 13.8,6.6 9.8,6.6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </header>

  <div id="error-banner" role="alert" aria-live="assertive" hidden>
    <span id="error-message"></span>
    <button id="error-retry-btn">Retry</button>
    <button id="error-close-btn" aria-label="Dismiss error">✕</button>
  </div>

  <div id="outlook-banner" hidden>
    <span id="outlook-text"></span>
  </div>

  <div id="map-container">
    <div id="map"></div>
    <div id="loading-overlay" aria-label="Loading map data">
      <div id="loading-spinner"></div>
    </div>
  </div>

  <div id="day-bar" role="group" aria-label="Forecast day" hidden></div>

  <div id="location-panel" hidden>
    <p id="location-hint" hidden>Bowcast forecasts the sky around you. Allow location, or search for a place.</p>
    <button id="use-gps-btn">Use my location</button>
    <div id="location-search-row">
      <input id="location-search" type="search" placeholder="Search a place..." autocomplete="off" aria-label="Search for a place" />
    </div>
    <ul id="location-results" role="listbox" aria-label="Place results"></ul>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="../app.js" type="module"></script>
</body>
</html>
